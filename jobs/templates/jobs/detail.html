{% extends "jobs/base.html" %}

{% block title %}Project &mdash; Cameron J. Davis{% endblock %}

{% block content %}

  <div class="detail-wrap">

    <div class="detail-back">
      <a href="{% url 'home' %}" class="btn btn-secondary">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" width="13" height="13" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/>
        </svg>
        Back to projects
      </a>
    </div>

    <img
      src="{{ job.image.url }}"
      alt="{{ job.summary|truncatechars:80 }}"
      class="detail-img"
    >

    <p class="detail-summary">{{ job.summary }}</p>

  </div>

{% endblock %}
